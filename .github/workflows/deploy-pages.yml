name: Deploy To GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve Publish Branch
        id: publish-branch
        env:
          PUBLIC_PAGES_BRANCH: ${{ vars.PUBLIC_PAGES_BRANCH }}
        run: echo "value=${PUBLIC_PAGES_BRANCH:-gh-pages}" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_TICKET_SALE_CONTRACT_ADDRESS: ${{ vars.NEXT_PUBLIC_TICKET_SALE_CONTRACT_ADDRESS }}
          POCKET_RPC: ${{ secrets.POCKET_RPC }}
          LAVA_RPC: ${{ secrets.LAVA_RPC }}
          PAGES_REPOSITORY: ${{ vars.PUBLIC_PAGES_REPO }}
        run: npm run build:pages

      - name: Disable Jekyll Processing
        run: touch out/.nojekyll

      - name: Publish To Public Pages Repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_PAGES_PAT }}
          external_repository: ${{ vars.PUBLIC_PAGES_REPO }}
          publish_branch: ${{ steps.publish-branch.outputs.value }}
          publish_dir: out
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
