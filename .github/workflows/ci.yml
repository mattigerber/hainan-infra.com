name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build App
        env:
          NEXT_PUBLIC_SITE_URL: https://hainan-infra.com
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: placeholder
          POCKET_RPC: https://rpc.ankr.com/eth
          LAVA_RPC: https://eth.llamarpc.com
        run: npm run build

      - name: Build Pages Export
        env:
          NEXT_PUBLIC_SITE_URL: https://hainan-infra.com
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: placeholder
          POCKET_RPC: https://rpc.ankr.com/eth
          LAVA_RPC: https://eth.llamarpc.com
        run: npm run build:pages
